services:
  - type: web
    name: youtube-api-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run db:generate
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: youtube-api-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: YOUTUBE_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://your-frontend-url.vercel.app

databases:
  - name: youtube-api-db
    databaseName: youtube_api
    user: youtube_api_user
    plan: free
